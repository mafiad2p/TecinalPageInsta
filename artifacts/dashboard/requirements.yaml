packages:
  "recharts": "For rendering beautiful dashboard charts"
  "date-fns": "For formatting dates in reports and logs"
  "framer-motion": "For page transitions and micro-interactions"
  "clsx": "Utility for constructing className strings"
  "tailwind-merge": "Utility for merging tailwind classes"

images:
  - path: "artifacts/dashboard/public/images/logo.png"
    description: "A minimal, modern geometric logo mark in vibrant indigo and cyan for an AI automation company called OpenClaw, dark background"
    aspect_ratio: "1:1"

notes:
  - "Assuming all API endpoints are prefixed with /api"
  - "Assuming standard JSON responses with { success: boolean, data: any }"
  - "Enforcing a dark theme by default via CSS variables"
